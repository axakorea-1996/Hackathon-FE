name: Spring Boot CI/CD to AWS EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Commit Message
        run: echo "COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -1 | tr -d '\n\r\"')" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          cd subscription
          docker build -t ${{ secrets.DOCKER_USERNAME }}/axakorea_hackathon:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/axakorea_hackathon:latest

      - name: Deploy Spring Boot to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/axakorea_hackathon:latest
            sudo docker stop spring-app || true
            sudo docker rm spring-app || true
            sudo docker run -d -p 80:8080 \
              -e OPENROUTER_API_KEY='${{ secrets.OPENROUTER_API_KEY }}' \
              -e GITHUB_TOKEN='${{ secrets.AXA_GITHUB_TOKEN }}' \
              --name spring-app \
              ${{ secrets.DOCKER_USERNAME }}/axakorea_hackathon:latest

      - name: Copy Frontend File to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "a.html"
          target: "/home/${{ secrets.EC2_USERNAME }}/frontend/"

      - name: Deploy Frontend - Start Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/${{ secrets.EC2_USERNAME }}/frontend

            mv /home/${{ secrets.EC2_USERNAME }}/frontend/a.html \
               /home/${{ secrets.EC2_USERNAME }}/frontend/index.html

            sudo docker stop nginx || true
            sudo docker rm nginx || true
            sudo docker run -d --name nginx \
              -p 3000:80 \
              -v /home/${{ secrets.EC2_USERNAME }}/frontend:/usr/share/nginx/html:ro \
              nginx:latest

      - name: Slack Notify - Success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ *배포 성공!*",
              "attachments": [
                {
                  "color": "good",
                  "fields": [
                    { "title": "레포지토리", "value": "${{ github.repository }}", "short": true },
                    { "title": "브랜치", "value": "${{ github.ref_name }}", "short": true },
                    { "title": "커밋 메시지", "value": "${{ env.COMMIT_MSG }}", "short": false },
                    { "title": "커밋한 사람", "value": "${{ github.actor }}", "short": true },
                    { "title": "Actions 링크", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack Notify - Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *배포 실패!*",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    { "title": "레포지토리", "value": "${{ github.repository }}", "short": true },
                    { "title": "브랜치", "value": "${{ github.ref_name }}", "short": true },
                    { "title": "커밋 메시지", "value": "${{ env.COMMIT_MSG }}", "short": false },
                    { "title": "실패한 사람", "value": "${{ github.actor }}", "short": true },
                    { "title": "❗ 에러 로그 확인", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
